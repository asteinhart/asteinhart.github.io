<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scrolly Map Demo</title>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/scrollama"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: sans-serif;
      }

      #scrolly-demo {
        position: relative;
      }

      .example-background {
        position: sticky;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        z-index: -1;
      }

      .example-foreground {
        position: relative;
        z-index: 1;
        padding: 0;
      }

      .step {
        height: 100%;
        min-height: 100vh;
        width: 60%;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .example-card {
        background-color: rgba(255, 255, 255, 0.8);
        padding: 1rem;
        font-size: 1.5rem;
        text-align: center;
        border: 1px solid #ababab;
      }

      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="scrolly-demo">
      <div class="example-background" id="scrolly-background">
        <div id="map"></div>
      </div>
      <div class="example-foreground">
        <div class="step">
          <div class="example-card" data-step-index="0">Step 1</div>
        </div>
        <div class="step">
          <div class="example-card" data-step-index="1">Step 2</div>
        </div>
        <div class="step">
          <div class="example-card" data-step-index="2">Step 3</div>
        </div>
        <div class="step">
          <div class="example-card" data-step-index="3">Step 4</div>
        </div>
      </div>
    </div>

    <script>
      let map = new maplibregl.Map({
        container: "map",
        style: "https://basemaps.cartocdn.com/gl/positron-gl-style/style.json",
        center: [-74.006, 40.73061],
        zoom: 7,
      });

      let activeStep;
      let scroller = scrollama();

      function handleStepEnter(response) {
        activeStep = response.index;
        update();
      }

      function init() {
        scroller
          .setup({
            step: "#scrolly-demo .step",
            offset: 0.5,
            debug: false,
          })
          .onStepEnter(handleStepEnter);
      }

      init();

      function update() {
        if (activeStep === 0) {
          map.flyTo({ center: [-74.006, 40.73061], zoom: 7 });
        } else if (activeStep === 1) {
          map.flyTo({ center: [-87.6298, 41.8781] });
        } else if (activeStep === 2) {
          map.flyTo({ center: [-104.9903, 39.7392] });
        } else if (activeStep === 3) {
          map.flyTo({ center: [-122.4194, 37.7749] });
        }
      }
    </script>
  </body>
</html>
