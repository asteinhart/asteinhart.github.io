<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Scrolly Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .scroller {
      position: relative;
    }

    .background {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      background-color: #b45c46;
      transition: background-color 0.3s ease;
      z-index: 0;
    }

    .foreground {
      position: relative;
      z-index: 1;
      margin-top: -100vh;
    }

    .step {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 1rem 1.5rem;
      font-size: 1.25rem;
      border-radius: 4px;
      width: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="scroller">
    <div class="background"></div>
    <div class="foreground">
      <div class="step"><div class="card">Step 0</div></div>
      <div class="step"><div class="card">Step 1</div></div>
      <div class="step"><div class="card">Step 2</div></div>
      <div class="step"><div class="card">Step 3</div></div>
    </div>
  </div>
  <script src="https://unpkg.com/scrollama"></script>
  <script>
    const colors = ["#b45c46", "#5f9ea0", "#7fa67a", "#b47846"];
    const background = document.querySelector(".background");

    const scroller = scrollama();
    scroller
      .setup({
        step: ".step",
        threshold: 0.5,
      })
      .onStepEnter((response) => {
        background.style.backgroundColor = colors[response.index];
      });
  </script>
</body>
</html>
